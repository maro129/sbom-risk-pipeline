name: DevSecOps Pipeline - SBOM Risk Gate (Caso 3)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sbom-risk-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Instalar dependencias del motor evaluador
        run: pip install -r engine/requirements.txt

      - name: Instalar dependencias del agente de IA
        run: pip install -r ai-agent/requirements.txt

      - name: Generar SBOM CycloneDX por microservicio (Syft/Trivy)
        run: |
          mkdir -p reports
          for SERVICIO in tracking-api inventory-service logging-utility; do
            echo ">>> Generando SBOM CycloneDX de $SERVICIO"
            trivy fs --format cyclonedx --output "reports/${SERVICIO}-sbom.json" "./services/${SERVICIO}"
          done
          echo ">>> Inyectando componente sospechoso en SBOM de tracking-api para demo del agente IA"
          python3 - <<'EOF'
          import json

          sbom_path = "reports/tracking-api-sbom.json"
          extra_path = "services/tracking-api/sbom-extra-components.json"

          with open(sbom_path) as f:
              sbom = json.load(f)

          with open(extra_path) as f:
              extras = json.load(f)

          if "components" not in sbom:
              sbom["components"] = []

          sbom["components"].extend(extras)

          with open(sbom_path, "w") as f:
              json.dump(sbom, f, indent=2)

          print(f"[OK] {len(extras)} componente(s) extra inyectado(s) en SBOM de tracking-api")
          EOF

      - name: Escanear el SBOM generado (el evaluador procesa ESTE JSON, no un escaneo aparte)
        run: |
          for SERVICIO in tracking-api inventory-service logging-utility; do
            echo ">>> Escaneando SBOM de $SERVICIO en busca de CVEs"
            trivy sbom "reports/${SERVICIO}-sbom.json" --format json --output "reports/${SERVICIO}.json"
          done

      - name: Ejecutar Engine Evaluador (R = f(V,E,C) por categoria de activo)
        id: evaluador
        run: python engine/evaluator.py reports
        continue-on-error: true

      - name: Ejecutar agente de IA - deteccion de typosquatting
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          for SERVICIO in tracking-api inventory-service logging-utility; do
            python ai-agent/typosquatting_detector.py "reports/${SERVICIO}-sbom.json" \
              | tee "reports/${SERVICIO}-typosquatting.json"
          done

      - name: Subir reportes como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: risk-reports
          path: reports/

      # ---- BLOQUEO FISICO HACIA DOCKER HUB ----
      # Los siguientes 3 pasos SOLO se ejecutan si el Engine Evaluador dio PASS.
      # Si dio BLOCK (outcome != success), GitHub Actions los muestra como
      # "Skipped" -- esa es la evidencia visual de que el despliegue a
      # Docker Hub fue fisicamente detenido por el Policy Gate.

      - name: Configurar Docker Buildx
        if: steps.evaluador.outcome == 'success'
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        if: steps.evaluador.outcome == 'success'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push de las imagenes a Docker Hub
        if: steps.evaluador.outcome == 'success'
        run: |
          for SERVICIO in tracking-api inventory-service logging-utility; do
            echo ">>> Construyendo y subiendo $SERVICIO"
            docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/sbom-${SERVICIO}:latest" "./services/${SERVICIO}"
            docker push "${{ secrets.DOCKERHUB_USERNAME }}/sbom-${SERVICIO}:latest"
          done

      - name: Aplicar decision final del Policy Gate
        run: |
          if [ "${{ steps.evaluador.outcome }}" = "failure" ]; then
            echo "::error::Policy Gate BLOQUEO el despliegue: uno o mas activos superan el umbral de riesgo (ver reports/risk_report.json). El push a Docker Hub fue detenido."
            exit 1
          fi
          echo "Policy Gate: PASS. Despliegue autorizado y publicado en Docker Hub."
